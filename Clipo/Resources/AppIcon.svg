<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <!-- Gradient for teal accent -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGradient)"/>

  <!-- Main clipboard shape with shadow -->
  <g filter="url(#shadow)">
    <!-- Clipboard body -->
    <rect x="180" y="260" width="664" height="540" rx="50" fill="#FFFFFF"/>

    <!-- Top clip mechanism -->
    <rect x="340" y="160" width="344" height="140" rx="30" fill="#F1F5F9"/>
    <rect x="370" y="200" width="284" height="60" rx="15" fill="url(#tealGradient)"/>

    <!-- Paper with lines -->
    <rect x="220" y="330" width="584" height="430" rx="20" fill="#F8FAFC"/>

    <!-- Content lines - styled as text -->
    <rect x="260" y="380" width="200" height="28" rx="6" fill="#CBD5E1"/>
    <rect x="260" y="430" width="420" height="20" rx="4" fill="#E2E8F0"/>
    <rect x="260" y="470" width="360" height="20" rx="4" fill="#E2E8F0"/>
    <rect x="260" y="510" width="400" height="20" rx="4" fill="#E2E8F0"/>

    <!-- Image placeholder block -->
    <rect x="260" y="560" width="180" height="120" rx="12" fill="#E2E8F0"/>
    <circle cx="350" cy="620" r="25" fill="#94A3B8"/>

    <!-- Checkmark circle accent -->
    <circle cx="620" cy="680" r="60" fill="url(#tealGradient)"/>
    <path d="M590 680 L610 700 L650 655" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
